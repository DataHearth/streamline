  schemas:
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Human-readable, safe-to-display error message.
        code:
          type: string
          description: |
            Stable machine-readable error code (e.g. last_admin,
            self_delete_forbidden, email_exists). Present for domain errors
            where the caller needs to branch on the specific reason; absent
            for generic errors where the message is sufficient.

    DeleteFileRequest:
      type: object
      properties:
        remove_torrent:
          type: boolean
          default: false
          description: |
            When true, also remove the source torrent from its download
            client (best-effort).

    PendingMedia:
      type: object
      required: [type, id, title]
      properties:
        type:
          type: string
          enum: [movie, episode]
        id:
          type: integer
          x-go-type: uint32
        title:
          type: string
        year:
          type: integer
          x-go-type: uint16
        season:
          type: integer
          x-go-type: uint16
        episode:
          type: integer
          x-go-type: uint16

    PendingItem:
      type: object
      required: [id, title, quality, reason, has_file]
      properties:
        id:
          type: integer
          x-go-type: uint32
        title:
          type: string
        quality:
          type: string
        reason:
          type: string
        has_file:
          type: boolean
          description: |
            Whether the matched movie/episode currently has a file. The UI
            shows Replace (swap) when true and Import (accept into the empty
            slot) when false.
        media:
          $ref: "#/components/schemas/PendingMedia"

    PendingList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PendingItem"

    ReplacePendingRequest:
      type: object
      properties:
        remove_old_torrent:
          type: boolean
          default: false
          description: |
            When true, also remove the existing file's source torrent from
            its download client (best-effort).

    IgnorePendingRequest:
      type: object
      properties:
        remove_torrent:
          type: boolean
          default: false
          description: |
            When true, also remove the proposed torrent from its download
            client.

    Movie:
      type: object
      required: [id, title, original_title, year, status, monitored, tmdb_id]
      properties:
        id:
          type: integer
          x-go-type: uint32
        title:
          type: string
        original_title:
          type: string
          description: |
            TMDB original_title. Equals title when the localized title
            matches the original; UI hides it in that case.
        year:
          type: integer
          x-go-type: uint16
        overview:
          type: string
        runtime:
          type: integer
          description: Runtime in minutes. Zero when unknown.
          x-go-type: uint16
        status:
          type: string
          enum: [wanted, downloading, available]
        monitored:
          type: boolean
          description: Whether Streamline auto-searches and upgrades this title.
        tmdb_id:
          type: integer
          format: int64
          minimum: 0
          maximum: 4294967295
          x-go-type: uint32
        quality_profile:
          type: string
          description: Name of the quality profile (empty resolves to the default).
        media_files:
          type: array
          nullable: true
          description: |
            Files attached to this movie. Only populated by GET /movies/{id};
            absent in list responses.
          items:
            $ref: "#/components/schemas/MediaFile"
        cast:
          type: array
          nullable: true
          description: |
            Top-billed cast from TMDB. Only populated by GET /movies/{id};
            absent in list responses.
          items:
            $ref: "#/components/schemas/CastMember"
        genres:
          type: array
          nullable: true
          description: |
            TMDB genres. Only populated by GET /movies/{id}; absent in
            list responses.
          items:
            type: string
        rating:
          type: number
          format: float
          nullable: true
          description: |
            TMDB vote average (0–10). Only populated by GET /movies/{id}
            and omitted when TMDB has no votes.

    CastMember:
      type: object
      required: [name]
      properties:
        tmdb_id:
          type: integer
          x-go-type: uint32
          description: TMDB person id; links to themoviedb.org/person/{id}.
        name:
          type: string
        character:
          type: string
        profile_url:
          type: string
          description: Absolute profile image URL, when available.
        person_url:
          type: string
          description: |
            Link to the person's page on the source provider (TMDB for movies,
            TVDB for series). Absent when the provider has no id for them.

    MediaFile:
      type: object
      required: [id, path, size]
      properties:
        id:
          type: integer
          x-go-type: uint32
        path:
          type: string
        size:
          type: integer
          format: int64
        quality:
          type: string
        format:
          type: string
        release_group:
          type: string
        parsed_source:
          type: string
          description: Source tag (BluRay/Remux/WEB-DL/…) parsed from the file's basename at response time.
        parsed_resolution:
          type: string
          description: Resolution (720p/1080p/2160p) parsed from the file's basename at response time.
        parsed_codec:
          type: string
          description: Video codec (x264/HEVC/AV1/…) parsed from the file's basename at response time.

    AddMovieRequest:
      type: object
      required: [tmdb_id]
      properties:
        tmdb_id:
          type: integer
          format: int64
          minimum: 0
          maximum: 4294967295
          x-go-type: uint32
        quality_profile:
          type: string
          description: Name of the quality profile (empty resolves to the default).

    UpdateMovieRequest:
      type: object
      properties:
        quality_profile:
          type: string
          description: Name of the quality profile (empty resolves to the default).
        status:
          type: string
          enum: [wanted, downloading, available]
        monitored:
          type: boolean

    PaginatedMovies:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
        total:
          type: integer
          x-go-type: uint32
        page:
          type: integer
          x-go-type: uint32
        limit:
          type: integer
          x-go-type: uint16

    MovieCounts:
      type: object
      required: [total, wanted, downloading, available, trend]
      properties:
        total:
          type: integer
          x-go-type: uint32
        wanted:
          type: integer
          x-go-type: uint32
        downloading:
          type: integer
          x-go-type: uint32
        available:
          type: integer
          x-go-type: uint32
        trend:
          type: array
          description: |
            Cumulative library size at the end of each day over the last 30
            days, oldest first. The final element equals `total`. All zeros
            when the library is empty.
          items:
            type: integer
            x-go-type: uint32

    TVShow:
      type: object
      required: [id, title, year, series_status, type, monitored, tvdb_id]
      properties:
        id:
          type: integer
          x-go-type: uint32
        title:
          type: string
        original_title:
          type: string
          description: |
            Untranslated TVDB name. Equals title when the localized title
            matches the original; UI hides it in that case.
        year:
          type: integer
          x-go-type: uint16
        overview:
          type: string
        series_status:
          type: string
          enum: [continuing, ended, upcoming]
        type:
          type: string
          enum: [standard, anime, daily]
        monitored:
          type: boolean
        tvdb_id:
          type: integer
          x-go-type: uint32
        network:
          type: string
        creator:
          type: string
        runtime:
          type: integer
          description: Episode runtime in minutes. Zero when unknown.
          x-go-type: uint16
        rating:
          type: number
          format: float
          nullable: true
        genres:
          type: array
          nullable: true
          items:
            type: string
        quality_profile:
          type: string
          description: Name of the quality profile (empty resolves to the default).
        have_episodes:
          type: integer
          description: Episodes with a media file. Rolled up across seasons.
          x-go-type: uint32
        total_episodes:
          type: integer
          x-go-type: uint32
        wanted_episodes:
