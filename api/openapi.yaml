# yaml-language-server: $schema=https://spec.openapis.org/oas/3.0/schema/2024-10-18
openapi: "3.0.4"
info:
  title: Streamline API
  version: 1.0.0
  description: |
    REST API for Streamline, a unified media management platform that replaces
    the *arr stack (Radarr, Sonarr, Lidarr, Readarr) and Seerr. Provides
    endpoints for managing movies, TV shows, indexers, download clients, media
    servers, quality profiles, user authentication, and media requests.

tags:
  - name: auth
    description: Authentication and user management
  - name: movies
    description: Movie library management and TMDB search
  - name: quality-profiles
    description: Quality profile configuration for media downloads
  - name: indexers
    description: Torznab indexer management and testing
  - name: download-clients
    description: Download client management and testing
  - name: media-servers
    description: Plex / Jellyfin / Emby server management and testing
  - name: library
    description: Bulk-file import wizard (scan → review → commit)
  - name: system
    description: Read-only runtime/build metadata
  - name: requests
    description: Media request workflow (request → approve/deny)

servers:
  - url: /api/v1

paths:

  # ── Movies ──────────────────────────────────────────────
  /movies:
    get:
      operationId: listMovies
      summary: List all movies
      description: Returns a paginated list of movies in the library.
      tags: [movies]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            x-go-type: uint32
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            x-go-type: uint16
      responses:
        "200":
          description: Paginated movie list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMovies"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: addMovie
      summary: Add a movie to the library
      description: |
        Fetches metadata from TMDB by ID and adds the movie to the library
        with the specified quality profile. The movie starts in "wanted" status.
      tags: [movies]
      requestBody:
        $ref: "#/components/requestBodies/AddMovie"
      responses:
        "201":
          description: Movie added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/counts:
    get:
      operationId: getMovieCounts
      summary: Movie status counts
      description: Returns total, wanted, downloading, and available counts for the library.
      tags: [movies]
      responses:
        "200":
          $ref: "#/components/responses/MovieCountsResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: getMovie
      summary: Get movie details
      description: Returns full details for a single movie including status and metadata.
      tags: [movies]
      responses:
        "200":
          description: Movie details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      operationId: patchMovie
      summary: Patch a movie
      description: Partially updates movie properties such as quality profile or monitored status.
      tags: [movies]
      requestBody:
        $ref: "#/components/requestBodies/UpdateMovie"
      responses:
        "200":
          description: Movie updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteMovie
      summary: Remove a movie from the library
      description: |
        Deletes the movie record. When delete_files=true, also removes
        attached media files from disk.
      tags: [movies]
      parameters:
        - $ref: "#/components/parameters/DeleteMovieFiles"
      responses:
        "204":
          description: Movie deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/{id}/search:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: searchMovie
      summary: Search indexers for a movie
      description: |
        Triggers an interactive search across all enabled indexers for the
        specified movie. Returns ranked results sorted by seeders.
      tags: [movies]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchResult"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/{id}/search-now:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: searchMovieNow
      summary: Dispatch an indexer search and grab for a single movie
      description: |
        Runs one indexer search-and-grab pass against the movie. On a
        matching release the download manager is invoked; otherwise the
        movie's cooldown timer is bumped.
      tags: [movies]
      responses:
        "202":
          $ref: "#/components/responses/MovieSearchAccepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/{id}/recommendations:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: getMovieRecommendations
      summary: TMDB recommendations for a movie
      description: |
        Returns TMDB's "recommended" movies for this title, in the order
        TMDB returns them. Used by the "More like this" rail on the movie
        detail view.
      tags: [movies]
      responses:
        "200":
          $ref: "#/components/responses/MovieRecommendations"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/{id}/play-on:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: getMoviePlayOnLinks
      summary: Resolve per-server deep links for the movie
      description: |
        For each enabled media server, attempts to find the movie and
        returns either a deep link URL (status=resolved), the server's
        web home URL (status=fallback) when the movie isn't found, or no
        URL (status=unavailable) when the server itself can't be reached.
      tags: [movies]
      responses:
        "200":
          $ref: "#/components/responses/MoviePlayOnLinks"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/{id}/grab:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: grabMovieRelease
      summary: Grab a specific release for this movie
      description: |
        Dispatches the chosen release to the highest-priority download
        client. Body is the SearchResult chosen from a browse-releases call.
      tags: [movies]
      requestBody:
        $ref: "#/components/requestBodies/GrabMovieRelease"
      responses:
        "202":
          $ref: "#/components/responses/MovieSearchAccepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/{id}/refresh-metadata:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: refreshMovieMetadata
      summary: Re-fetch TMDB metadata for one movie
      tags: [movies]
      responses:
        "200":
          $ref: "#/components/responses/MovieRefreshed"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/{id}/rename:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: renameMovieFiles
      summary: Rename movie files to match the library naming pattern
      tags: [movies]
      parameters:
        - $ref: "#/components/parameters/RenamePreview"
      responses:
        "200":
          $ref: "#/components/responses/MovieRenamePlan"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /movies/{id}/files/{fileId}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/FileID"
    delete:
      operationId: deleteMovieFile
      summary: Delete a movie media file
      description: |
        Removes one media file from disk and DB and reverts the movie to
        "wanted" so the next monitored search re-grabs it. When
        remove_torrent=true, also removes the source torrent from its
        download client (best-effort).
      tags: [movies]
      requestBody:
        $ref: "#/components/requestBodies/DeleteFile"
      responses:
        "204":
          $ref: "#/components/responses/FileDeleted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /search/movie:
    get:
      operationId: searchTMDBMovie
      summary: Search TMDB for movies
      description: |
        Searches The Movie Database for movies matching the query. Used
        to find TMDB IDs before adding movies to the library.
      tags: [movies]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: integer
            x-go-type: uint16
      responses:
        "200":
          description: TMDB search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TMDBMovieResult"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Series (TV) ─────────────────────────────────────────
  /series:
    get:
      operationId: listSeries
      summary: List all series
      description: Returns a paginated list of series in the library.
      tags: [series]
      parameters:
        - $ref: "#/components/parameters/SeriesPage"
        - $ref: "#/components/parameters/SeriesLimit"
        - $ref: "#/components/parameters/SeriesStatus"
        - $ref: "#/components/parameters/SeriesType"
        - $ref: "#/components/parameters/SeriesQuery"
        - $ref: "#/components/parameters/SeriesSort"
      responses:
        "200":
          $ref: "#/components/responses/SeriesList"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: addSeries
      summary: Add a series by TVDB id
      description: |
        Fetches metadata from TVDB by ID and adds the series to the library
        with the specified quality profile and an optional monitoring preset.
      tags: [series]
      requestBody:
        $ref: "#/components/requestBodies/AddSeries"
      responses:
        "201":
          $ref: "#/components/responses/SeriesCreated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/counts:
    get:
      operationId: getSeriesCounts
      summary: Series status counts
      description: Returns total, continuing, ended, and wanted-episode counts.
      tags: [series]
      responses:
        "200":
          $ref: "#/components/responses/SeriesCountsResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/lookup:
    get:
      operationId: lookupSeries
      summary: Search TVDB for series to add
      description: |
        Searches TheTVDB for series matching the query. Used to find TVDB
        IDs before adding series to the library.
      tags: [series]
      parameters:
        - $ref: "#/components/parameters/SeriesLookupQuery"
      responses:
        "200":
          $ref: "#/components/responses/SeriesLookupResults"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: getSeries
      summary: Get series details
      description: Returns full details for a single series including seasons and episodes.
      tags: [series]
      responses:
        "200":
          $ref: "#/components/responses/SeriesDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      operationId: patchSeries
      summary: Patch a series
      description: |
        Partially updates series properties (monitored, quality profile) and
        optionally applies a one-shot monitoring preset to its episodes.
      tags: [series]
      requestBody:
        $ref: "#/components/requestBodies/PatchSeries"
      responses:
        "200":
          $ref: "#/components/responses/SeriesDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteSeries
      summary: Remove a series from the library
      description: |
        Deletes the series record. When delete_files=true, also removes
        attached media files from disk.
      tags: [series]
      parameters:
        - $ref: "#/components/parameters/DeleteSeriesFiles"
      responses:
        "204":
          $ref: "#/components/responses/SeriesDeleted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/seasons/{number}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/SeasonNumber"
    patch:
      operationId: patchSeason
      summary: Toggle season monitoring
      tags: [series]
      requestBody:
        $ref: "#/components/requestBodies/MonitorToggle"
      responses:
        "204":
          $ref: "#/components/responses/SeasonUpdated"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/seasons/{number}/search:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/SeasonNumber"
    post:
      operationId: browseSeasonReleases
      summary: Search indexers for a season's releases
      description: |
        Interactive search across enabled indexers for a season pack
        (tvsearch keyed by tvdbid + season). Returns ranked results to choose
        from; POST the chosen release to .../grab to download it.

        Whole-series (integral / complete) and multi-season packs (e.g.
        S01-S05) are filtered out of these results: grabbing one would
        import every season it contains, not only this one. Use the
        whole-series browse (POST /series/{id}/browse) to grab those.
      tags: [series]
      responses:
        "200":
          $ref: "#/components/responses/SearchResults"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/seasons/{number}/grab:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/SeasonNumber"
    post:
      operationId: grabSeasonRelease
      summary: Grab a season-pack release
      description: |
        Dispatches the chosen season-pack release to the highest-priority
        download client and marks every episode in the season downloading.
        Body is the SearchResult chosen from a browse call.
      tags: [series]
      requestBody:
        $ref: "#/components/requestBodies/GrabSeriesRelease"
      responses:
        "202":
          $ref: "#/components/responses/SeriesGrabAccepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/episodes/{episodeId}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/EpisodeID"
    patch:
      operationId: patchEpisode
      summary: Toggle episode monitoring
      tags: [series]
      requestBody:
        $ref: "#/components/requestBodies/MonitorToggle"
      responses:
        "204":
          $ref: "#/components/responses/EpisodeUpdated"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/search:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: searchSeries
      summary: Auto-search all wanted episodes for this series
      description: |
        Dispatches one indexer search-and-grab pass over the series' wanted
        episodes, preferring season packs when a whole season is wanted.
      tags: [series]
      responses:
        "202":
          $ref: "#/components/responses/SeriesSearchAccepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/browse:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: browseSeriesReleases
      summary: Search indexers for whole-series releases
      description: |
        Interactive search across enabled indexers for the entire series
        (tvsearch keyed by tvdbid, no season). Returns ranked results to choose
        from; POST the chosen release to .../grab to download it.
      tags: [series]
      responses:
        "200":
          $ref: "#/components/responses/SearchResults"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/grab:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: grabSeriesRelease
      summary: Grab a whole-series release
      description: |
        Dispatches the chosen (integral / multi-season) release to the
        highest-priority download client and marks every episode in the series
        downloading. Body is the SearchResult chosen from a browse call.
      tags: [series]
      requestBody:
        $ref: "#/components/requestBodies/GrabSeriesRelease"
      responses:
        "202":
          $ref: "#/components/responses/SeriesGrabAccepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/episodes/{episodeId}/grab:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/EpisodeID"
    post:
      operationId: grabEpisodeRelease
      summary: Grab a specific release for this episode
      description: |
        Dispatches the chosen release to the highest-priority download
        client. Body is the SearchResult chosen from a browse-releases call.
      tags: [series]
      requestBody:
        $ref: "#/components/requestBodies/GrabSeriesRelease"
      responses:
        "202":
          $ref: "#/components/responses/SeriesGrabAccepted"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/episodes/{episodeId}/file:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/EpisodeID"
    delete:
      operationId: deleteEpisodeFile
      summary: Delete an episode media file
      description: |
        Removes the episode's media file from disk and DB and reverts the
        episode to "wanted" so the next monitored search re-grabs it. When
        remove_torrent=true, also removes the source torrent from its
        download client (best-effort).
      tags: [series]
      requestBody:
        $ref: "#/components/requestBodies/DeleteFile"
      responses:
        "204":
          $ref: "#/components/responses/FileDeleted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/episodes/{episodeId}/search:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/EpisodeID"
    post:
      operationId: browseEpisodeReleases
      summary: Search indexers for one episode's releases
      description: |
        Interactive search across enabled indexers for a single episode
        (tvsearch keyed by tvdbid + season + episode). Returns ranked results
        to choose from; POST the chosen release to .../grab to download it.
      tags: [series]
      responses:
        "200":
          $ref: "#/components/responses/SearchResults"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/refresh-metadata:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: refreshSeriesMetadata
      summary: Re-fetch TVDB metadata for one series
      tags: [series]
      responses:
        "200":
          $ref: "#/components/responses/SeriesDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/rename:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: renameSeriesFiles
      summary: Rename series episode files to match the library naming pattern
      tags: [series]
      parameters:
        - $ref: "#/components/parameters/RenamePreview"
      responses:
        "200":
          $ref: "#/components/responses/SeriesRenamePlan"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /series/{id}/play-on:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: getSeriesPlayOnLinks
      summary: Resolve per-server deep links for the series
      description: |
        For each enabled media server, attempts to find the series and
        returns either a deep link URL (status=resolved), the server's web
        home URL (status=fallback) when the series isn't found, or no URL
        (status=unavailable) when the server itself can't be reached.
      tags: [series]
      responses:
        "200":
          $ref: "#/components/responses/SeriesPlayOnLinks"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Quality Profiles ────────────────────────────────────
  /quality-profiles:
    get:
      operationId: listQualityProfiles
      summary: List quality profiles
      description: Returns all configured quality profiles.
      tags: [quality-profiles]
      responses:
        "200":
          description: Quality profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QualityProfile"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createQualityProfile
      summary: Create a quality profile
      description: Creates a new quality profile with resolution preferences.
      tags: [quality-profiles]
      requestBody:
        $ref: "#/components/requestBodies/CreateQualityProfile"
      responses:
        "201":
          description: Profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualityProfile"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /quality-profiles/{name}:
    parameters:
      - $ref: "#/components/parameters/ResourceName"
    put:
      operationId: updateQualityProfile
      summary: Update a quality profile
      tags: [quality-profiles]
      requestBody:
        $ref: "#/components/requestBodies/CreateQualityProfile"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualityProfile"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteQualityProfile
      summary: Delete a quality profile
      tags: [quality-profiles]
      responses:
        "204":
          description: Profile deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Indexers ────────────────────────────────────────────
  /indexers:
    get:
      operationId: listIndexers
      summary: List configured indexers
      description: Returns all configured Torznab indexers.
      tags: [indexers]
      responses:
        "200":
          description: Indexer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Indexer"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createIndexer
      summary: Add an indexer
      description: Adds a new Torznab-compatible indexer.
      tags: [indexers]
      requestBody:
