  # ── Auth ────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: authMe
      summary: Current authenticated user
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: User
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateMe
      summary: Update current user profile
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        $ref: "#/components/requestBodies/UpdateMe"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/password:
    post:
      operationId: changePassword
      summary: Change current user's password; revokes all other sessions
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        $ref: "#/components/requestBodies/ChangePassword"
      responses:
        "204":
          description: Password changed; other sessions revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /auth/me/api-keys:
    get:
      operationId: listMyApiKeys
      summary: List current user's API keys
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApiKey" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMyApiKey
      summary: Create a new API key for current user; raw_token shown once
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        $ref: "#/components/requestBodies/CreateApiKey"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiKeyCreated" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/api-keys/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    delete:
      operationId: deleteMyApiKey
      summary: Revoke an API key owned by current user
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          description: Revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/me/sessions:
    get:
      operationId: listMySessions
      summary: List current user's active sessions
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Session" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/sessions/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    delete:
      operationId: deleteMySession
      summary: Revoke a session owned by current user
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          description: Revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/jwt/rotate:
    post:
      operationId: rotateJWTSecret
      summary: Rotate the JWT signing secret (admin)
      description: |
        Generates a fresh HMAC signing secret, persists it to the config file,
        atomically swaps the in-memory secret, truncates all sessions, and
        re-issues a fresh bearer token for the caller. Every other active
        session is invalidated immediately.
      tags: [auth, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/JWTRotated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/invites:
    get:
      operationId: listInvites
      summary: List pending invites (admin)
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: Invites
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Invite" }
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createInvite
      summary: Create an invite (admin)
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        $ref: "#/components/requestBodies/CreateInvite"
      responses:
        "201":
          description: Invite created; raw_token shown once
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteCreated" }
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/invites/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    delete:
      operationId: revokeInvite
      summary: Revoke an invite (admin)
      tags: [auth]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          description: Revoked
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /config/auth:
    get:
      operationId: getConfigAuth
      summary: Get auth configuration (admin)
      description: |
        Returns the current runtime-safe auth configuration. Changes made via
        PATCH take effect immediately — no restart required.
      tags: [config, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/AuthConfig"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      operationId: updateConfigAuth
      summary: Patch auth configuration (admin)
      tags: [config, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        $ref: "#/components/requestBodies/UpdateAuthConfig"
      responses:
        "200":
          $ref: "#/components/responses/AuthConfig"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /config/oidc:
    get:
      operationId: listOIDCProviders
      summary: List OIDC providers (admin)
      description: |
        Returns all configured OIDC providers plus a flag indicating whether
        recent OIDC mutations still require a process restart to take effect.
      tags: [config, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/OIDCProviderList"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createOIDCProvider
      summary: Add an OIDC provider (admin)
      description: |
        Validates the issuer by fetching its discovery document, then persists
        the provider. Takes effect after the process restarts.
      tags: [config, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        $ref: "#/components/requestBodies/CreateOIDCProvider"
      responses:
        "201":
          $ref: "#/components/responses/OIDCProviderCreated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /config/oidc/{name}:
    parameters:
      - $ref: "#/components/parameters/OIDCProviderName"
    get:
      operationId: getOIDCProvider
      summary: Get an OIDC provider (admin)
      tags: [config, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/OIDCProvider"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateOIDCProvider
      summary: Update an OIDC provider (admin)
      description: |
        Updates issuer/client_id/client_secret on an existing provider.
        Leaving client_secret blank preserves the current secret. Takes effect
        after the process restarts.
      tags: [config, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        $ref: "#/components/requestBodies/UpdateOIDCProvider"
      responses:
        "200":
          $ref: "#/components/responses/OIDCProvider"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      operationId: deleteOIDCProvider
      summary: Delete an OIDC provider (admin)
      tags: [config, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          description: Provider deleted (restart required to take effect)
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users:
    get:
      operationId: listUsers
      summary: List users (admin)
      description: |
        Returns a paginated list of users filtered by optional search term and role.
        Requires admin role. Search matches email or display name (case-insensitive).
      tags: [users, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: q
          description: Case-insensitive substring match on email or display_name.
          schema: { type: string }
        - in: query
          name: role
          description: Filter by exact role.
          schema:
            type: string
            enum: [admin, member, request_only]
        - in: query
          name: limit
          description: Max items per page (1..100).
          schema: { type: integer, default: 25, maximum: 100, x-go-type: uint16 }
        - in: query
          name: offset
          description: Zero-based offset for pagination.
          schema: { type: integer, default: 0, x-go-type: uint32 }
        - $ref: "#/components/parameters/UsersSort"
        - $ref: "#/components/parameters/UsersOrder"
      responses:
        "200":
          $ref: "#/components/responses/UsersList"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createUser
      summary: Create user (admin)
      description: |
        Directly creates a user with the supplied password. Intended for admin
        onboarding flows that bypass the invite workflow. Email must be unique.
      tags: [users, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateUserRequest" }
      responses:
        "201":
          $ref: "#/components/responses/UserCreated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /users/{uid}:
    parameters:
      - $ref: "#/components/parameters/UserID"
    get:
      operationId: getUser
      summary: Get user detail (admin)
      description: |
        Returns the target user along with their API keys and active sessions.
        Admin only.
      tags: [users, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/UserDetail"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateUser
      summary: Patch user (admin)
      description: |
        Updates a target user's role, display_name, or auth_method. Demoting
        the last remaining admin is rejected with 409 last_admin.
      tags: [users, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateUserRequest" }
      responses:
        "200":
          $ref: "#/components/responses/UserUpdated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteUser
      summary: Delete user (admin)
      description: |
        Permanently deletes a user. Rejected with 409 if the caller is the
        target (self_delete_forbidden), the target is the sole admin
        (last_admin), or the target owns media requests (user_has_requests).
      tags: [users, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          $ref: "#/components/responses/UserDeleted"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{uid}/password-reset:
    parameters:
      - $ref: "#/components/parameters/UserID"
    post:
      operationId: resetUserPassword
      summary: Reset user password (admin)
      description: |
        Sets a new password for the target user without requiring the old one
        and revokes all of the target's active sessions. Admin only.
      tags: [users, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordRequest" }
      responses:
        "204":
          $ref: "#/components/responses/PasswordReset"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /users/{uid}/unlock:
    parameters:
      - $ref: "#/components/parameters/UserID"
    post:
      operationId: unlockUser
      summary: Clear lockout state on a user (admin)
      description: |
        Resets failed_login_count and clears locked_until on the target user.
        Returns 204 even when the user wasn't locked. Admin only.
      tags: [users, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          $ref: "#/components/responses/UserUnlocked"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{uid}/api-keys/{kid}:
    parameters:
      - $ref: "#/components/parameters/UserID"
      - $ref: "#/components/parameters/ApiKeyID"
    delete:
      operationId: revokeUserApiKey
      summary: Revoke user's API key (admin)
      description: |
        Revokes the specified API key belonging to the target user. Admin only.
        Returns 404 if the key does not exist or does not belong to the user.
      tags: [users, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          $ref: "#/components/responses/UserApiKeyRevoked"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{uid}/sessions/{sid}:
    parameters:
      - $ref: "#/components/parameters/UserID"
      - $ref: "#/components/parameters/SessionID"
    delete:
      operationId: revokeUserSession
      summary: Revoke user's session (admin)
      description: |
        Revokes the specified session belonging to the target user, forcing
        logout on that device. Admin only. Returns 404 if the session does not
        exist or does not belong to the user.
      tags: [users, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "204":
          $ref: "#/components/responses/UserSessionRevoked"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Schedules ───────────────────────────────────────────
  /schedules:
    get:
      operationId: listSchedules
      summary: List all scheduled jobs with current state.
      tags: [schedules]
      responses:
        "200":
          $ref: "#/components/responses/ScheduleList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /schedules/{name}:
    parameters:
      - $ref: "#/components/parameters/ScheduleName"
    get:
      operationId: getSchedule
      summary: Get a single scheduled job by name.
      tags: [schedules]
      responses:
        "200":
          $ref: "#/components/responses/Schedule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateSchedule
      summary: Edit the interval of a scheduled job.
      tags: [schedules]
      requestBody:
        $ref: "#/components/requestBodies/ScheduleUpdate"
      responses:
        "200":
          $ref: "#/components/responses/Schedule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /schedules/{name}/pause:
    parameters:
      - $ref: "#/components/parameters/ScheduleName"
    post:
      operationId: pauseSchedule
      summary: Pause a scheduled job.
      tags: [schedules]
      responses:
        "200":
          $ref: "#/components/responses/Schedule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /schedules/{name}/resume:
    parameters:
      - $ref: "#/components/parameters/ScheduleName"
    post:
      operationId: resumeSchedule
      summary: Resume a paused job.
      tags: [schedules]
      responses:
        "200":
          $ref: "#/components/responses/Schedule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /schedules/{name}/run:
    parameters:
      - $ref: "#/components/parameters/ScheduleName"
    post:
      operationId: runSchedule
      summary: Trigger a one-off run of a job.
      tags: [schedules]
      responses:
        "200":
          $ref: "#/components/responses/Schedule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /library/imports:
    get:
      operationId: ListImports
      tags: [library]
      parameters:
        - $ref: "#/components/parameters/ImportPage"
        - $ref: "#/components/parameters/ImportLimit"
      responses:
        "200":
          $ref: "#/components/responses/ImportScanList"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: StartImport
      tags: [library]
      requestBody:
        $ref: "#/components/requestBodies/StartImport"
      responses:
        "201":
          $ref: "#/components/responses/ImportScan"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /library/imports/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: GetImport
      tags: [library]
      responses:
        "200":
          $ref: "#/components/responses/ImportScan"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: DeleteImport
      tags: [library]
      responses:
        "204":
          $ref: "#/components/responses/ImportDeleted"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /library/imports/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: CancelImport
      tags: [library]
      responses:
        "204":
          $ref: "#/components/responses/ImportCancelled"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /library/imports/{id}/commit:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: CommitImport
      tags: [library]
      responses:
        "202":
          $ref: "#/components/responses/ImportScan"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /library/imports/{id}/files:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: ListImportFiles
      tags: [library]
      parameters:
        - $ref: "#/components/parameters/ImportClassification"
        - $ref: "#/components/parameters/ImportQuery"
        - $ref: "#/components/parameters/ImportPage"
        - $ref: "#/components/parameters/ImportFileLimit"
      responses:
        "200":
          $ref: "#/components/responses/ImportScanFileList"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /library/imports/{id}/files/{fileId}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/ImportScanFileID"
    patch:
      operationId: UpdateImportFileDecision
      tags: [library]
      requestBody:
        $ref: "#/components/requestBodies/UpdateImportFileDecision"
      responses:
        "200":
          $ref: "#/components/responses/ImportScanFile"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /library/imports/{id}/shows:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: ListImportShows
      tags: [library]
      parameters:
        - $ref: "#/components/parameters/ImportClassification"
        - $ref: "#/components/parameters/ImportPage"
        - $ref: "#/components/parameters/ImportFileLimit"
      responses:
        "200":
          $ref: "#/components/responses/ImportScanShowList"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /library/imports/{id}/shows/{showId}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
      - $ref: "#/components/parameters/ImportScanShowID"
    patch:
      operationId: UpdateImportShowDecision
      tags: [library]
      requestBody:
        $ref: "#/components/requestBodies/UpdateImportShowDecision"
      responses:
        "200":
          $ref: "#/components/responses/ImportScanShow"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /activity:
    get:
      operationId: listActivity
      summary: Library activity events.
      description: |
        Reverse-chronological feed of MovieEvent rows. Supports cursor
        pagination and optional filtering by event type, movie id, and a
        time window.
      parameters:
        - $ref: "#/components/parameters/ActivityType"
        - $ref: "#/components/parameters/ActivityMovieID"
        - $ref: "#/components/parameters/ActivitySince"
        - $ref: "#/components/parameters/ActivityBefore"
        - $ref: "#/components/parameters/ActivityLimit"
        - $ref: "#/components/parameters/ActivityCursor"
      responses:
        "200":
          $ref: "#/components/responses/ActivityList"
        "400":
          $ref: "#/components/responses/BadRequest"

  /activity/queue:
    get:
      operationId: getDownloadQueue
      summary: Live download queue snapshot.
      description: |
        In-flight DownloadRecords (downloading or importing) enriched with
        live progress / speed / ETA polled from the download client. Served
        from a short-TTL cached snapshot; unreachable clients degrade to the
        stored record without telemetry.
      tags: [activity]
      responses:
        "200":
          $ref: "#/components/responses/DownloadQueue"

  /activity/queue/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    delete:
      operationId: cancelQueueItem
      summary: Cancel an in-flight download.
      description: |
        Removes the torrent (and its partial files) from the client, deletes
        the record, and reverts the movie to "wanted" when it has no file.
      tags: [activity]
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /activity/queue/{id}/pause:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: pauseQueueItem
      summary: Pause an in-flight download.
      tags: [activity]
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /activity/queue/{id}/resume:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: resumeQueueItem
      summary: Resume a paused download.
      tags: [activity]
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /activity/history:
    get:
      operationId: listDownloadHistory
      summary: Terminal download history (completed/failed), paginated.
      tags: [activity]
      parameters:
        - $ref: "#/components/parameters/ActivityLimit"
        - $ref: "#/components/parameters/ActivityCursor"
      responses:
        "200":
          $ref: "#/components/responses/DownloadHistory"
        "400":
          $ref: "#/components/responses/BadRequest"

  /activity/history/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    delete:
      operationId: deleteHistoryItem
      summary: Delete one history record.
      tags: [activity]
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /activity/history/clear-completed:
    post:
      operationId: clearCompletedHistory
      summary: Delete all completed history records.
      tags: [activity]
      responses:
        "200":
          $ref: "#/components/responses/ClearCompletedResult"
        "403":
          $ref: "#/components/responses/Forbidden"

  /activity/pending:
    get:
      operationId: listPending
      summary: Adopted-torrent proposals awaiting a decision.
      description: |
        Manually-added managed-category torrents streamline could not safely
        auto-import (resolution too low, file already exists, ambiguous or
        season-pack match). Each is a status=pending DownloadRecord.
      tags: [activity]
      responses:
        "200":
          $ref: "#/components/responses/PendingList"

  /activity/pending/{id}/import:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: importPending
      summary: Accept a proposal and import it as-is.
      tags: [activity]
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /activity/pending/{id}/replace:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: replacePending
      summary: Delete the existing file, then import the proposal.
      tags: [activity]
      requestBody:
        $ref: "#/components/requestBodies/ReplacePending"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /activity/pending/{id}/ignore:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: ignorePending
      summary: Dismiss a proposal (optionally removing its torrent).
      tags: [activity]
      requestBody:
        $ref: "#/components/requestBodies/IgnorePending"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /calendar/upcoming:
    get:
      operationId: listUpcomingReleases
      summary: Upcoming wanted-movie digital releases in [from, to).
      parameters:
        - $ref: "#/components/parameters/CalendarFrom"
        - $ref: "#/components/parameters/CalendarTo"
      responses:
        "200":
          $ref: "#/components/responses/UpcomingList"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── System ──────────────────────────────────────────────
  /system/info:
    get:
      operationId: getSystemInfo
      summary: Read-only environment summary (admin)
      description: |
        Returns the values shown on the Settings → General page: app name,
        public URL, auth mode, data/database paths and disk usage, build
        info, and the running Go version. All values are derived from
        runtime state and the loaded config; nothing is editable through
        this endpoint (the config file remains the source of truth).
      tags: [system, admin]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/SystemInfo"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Requests ────────────────────────────────────────────
  /requests:
    get:
      operationId: listRequests
      summary: List media requests
      description: |
        Reviewers (admin/member) see all requests; request_only users see
        only their own (scoped server-side). Filterable by status and
        media_type.
      tags: [requests]
      parameters:
        - $ref: "#/components/parameters/RequestStatus"
        - $ref: "#/components/parameters/RequestMediaType"
        - $ref: "#/components/parameters/RequestPage"
        - $ref: "#/components/parameters/RequestLimit"
      responses:
        "200":
          $ref: "#/components/responses/RequestsList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createRequest
      summary: Request a movie or show
      tags: [requests]
      requestBody:
        $ref: "#/components/requestBodies/CreateRequest"
      responses:
        "201":
          $ref: "#/components/responses/RequestCreated"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /requests/counts:
    get:
      operationId: getRequestCounts
      summary: Request counts by status
      tags: [requests]
      responses:
        "200":
          $ref: "#/components/responses/RequestCountsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /requests/{id}/approve:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: approveRequest
      summary: Approve a request (admin/member) — creates the library item
      description: |
        Creates the library item with the chosen quality profile. Omitting
        quality_profile (or sending it empty) uses the server default.
      tags: [requests]
      requestBody:
        $ref: "#/components/requestBodies/ApproveRequest"
      responses:
        "200":
          $ref: "#/components/responses/RequestDetail"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /requests/{id}/metadata:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    get:
      operationId: getRequestMetadata
      summary: Cover and synopsis for a requested item
      description: |
        Fetches poster, overview and basic metadata for the requested movie
        (TMDB) or show (TVDB) so reviewers can judge the request. Visible to
        reviewers (admin/member) and to the requester for their own request.
      tags: [requests]
      responses:
        "200":
          $ref: "#/components/responses/RequestMediaDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /requests/{id}/deny:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: denyRequest
      summary: Deny a request (admin)
      tags: [requests]
      requestBody:
        $ref: "#/components/requestBodies/DenyRequest"
      responses:
        "200":
          $ref: "#/components/responses/RequestDetail"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /requests/{id}/reopen:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    post:
      operationId: reopenRequest
      summary: Reopen a denied request (admin)
      tags: [requests]
      responses:
        "200":
          $ref: "#/components/responses/RequestDetail"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

security:
  - BearerAuth: []
  - ApiKeyAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login or /auth/register
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key created via /users/me/api-keys

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        x-go-type: uint32
    ResourceName:
      name: name
      in: path
      required: true
      description: Stable resource name (identity for config-backed resources).
      schema:
        type: string
    RequestStatus:
      name: status
      in: query
      required: false
      description: Filter by request status.
      schema:
        type: string
        enum: [pending, approved, denied, available]
    RequestMediaType:
      name: media_type
      in: query
      required: false
      schema:
        type: string
        enum: [movie, tvshow]
    RequestPage:
      name: page
      in: query
      required: false
      schema:
        type: integer
        x-go-type: uint32
        default: 1
    RequestLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        x-go-type: uint32
        default: 50
    UserID:
      name: uid
      in: path
      required: true
      description: Target user ID.
      schema:
        type: integer
        x-go-type: uint32
    ApiKeyID:
      name: kid
      in: path
      required: true
      description: Target API key ID scoped to the user.
      schema:
        type: integer
        x-go-type: uint32
    SessionID:
      name: sid
      in: path
      required: true
      description: Target session ID scoped to the user.
      schema:
        type: integer
        x-go-type: uint32
    OIDCProviderName:
      name: name
      in: path
      required: true
      description: Target OIDC provider name.
      schema:
        type: string

    ScheduleName:
      name: name
      in: path
      required: true
      description: Registered scheduled-job name (e.g. "rss-sync").
      schema:
        type: string
        minLength: 1

    ImportScanFileID:
      name: fileId
      in: path
      required: true
      description: Target ImportScanFile ID scoped to the parent scan.
      schema:
        type: integer
        x-go-type: uint32
    ImportScanShowID:
      name: showId
      in: path
      required: true
      description: Target ImportScanShow ID scoped to the parent scan.
      schema:
        type: integer
        x-go-type: uint32
    ImportPage:
      name: page
      in: query
      schema:
        type: integer
        x-go-type: uint16
        minimum: 1
        default: 1
    ImportLimit:
      name: limit
      in: query
      schema:
        type: integer
        x-go-type: uint16
        minimum: 1
        maximum: 100
        default: 20
    ImportFileLimit:
      name: limit
      in: query
      schema:
        type: integer
        x-go-type: uint16
        minimum: 1
        maximum: 100
        default: 50
    ImportClassification:
      name: classification
      in: query
      schema:
        type: string
        enum: [confirmed, ambiguous, unmatched, existing]
    ImportQuery:
      name: q
      in: query
      schema:
        type: string

    DeleteMovieFiles:
      name: delete_files
      in: query
      description: When true, delete the attached media_files from disk too.
      schema:
        type: boolean

    RenamePreview:
      name: preview
      in: query
      description: When true, returns the rename plan without applying it.
      schema:
        type: boolean

    ActivityType:
      name: type
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
          enum:
            [
              grabbed,
              download_completed,
              download_failed,
              imported,
              import_failed,
              drift_detected,
              drift_confirmed,
            ]
      style: form
