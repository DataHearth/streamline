apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "streamline.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "streamline.labels" . | nindent 4 }}
data:
  config.yaml: |
{{- $cfg := deepCopy .Values.config }}
{{- $otel := $cfg.otel | default dict }}
{{- $_ := set $otel "endpoint" (include "streamline.otelEndpoint" .) }}
{{- $_ = set $cfg "otel" $otel }}
{{- if .Values.library.shared.enabled }}
{{- $mount := .Values.library.shared.mountPath }}
{{- $lib := $cfg.library | default dict }}
{{- $_ = set $lib "movie_path" (default (printf "%s/media/movies" $mount) $lib.movie_path) }}
{{- $_ = set $lib "series_path" (default (printf "%s/media/series" $mount) $lib.series_path) }}
{{- $_ = set $lib "download_path" (default (printf "%s/downloads" $mount) $lib.download_path) }}
{{- $_ = set $cfg "library" $lib }}
{{- end }}
{{ toYaml $cfg | indent 4 }}
