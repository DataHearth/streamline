{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "streamline.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "streamline.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $k, $v := .Values.secrets }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
