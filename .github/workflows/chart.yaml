# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Chart

# The chart versions independently of the app: a values/template fix ships
# without an app release, and an app release ships without a chart bump.
# App releases are tags v*.*.* (see release.yaml) — these are chart-v*.*.*.
on:
  push:
    tags: ["chart-v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.1

      # The tag names the release; Chart.yaml is what actually gets packaged.
      # If they disagree the push lands on a version nobody asked for.
      - name: Verify tag matches Chart.yaml
        run: |
          chart_version=$(sed -n 's/^version: *//p' deploy/helm/streamline/Chart.yaml)
          tag_version="${GITHUB_REF_NAME#chart-v}"
          if [ "$chart_version" != "$tag_version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} wants chart ${tag_version}, but Chart.yaml says ${chart_version}"
            exit 1
          fi
          echo "version=${chart_version}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package + push chart
        run: task release:helm

      - name: Summary
        if: always()
        run: |
          echo "### Helm Chart" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Chart \`${{ env.version }}\` published → \`oci://ghcr.io/datahearth/charts/streamline\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```bash' >> "$GITHUB_STEP_SUMMARY"
            echo "helm install streamline oci://ghcr.io/datahearth/charts/streamline --version ${{ env.version }}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Chart publish failed" >> "$GITHUB_STEP_SUMMARY"
          fi
